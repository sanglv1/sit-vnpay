# Production profile — PostgreSQL required
# Connection (ưu tiên): SPRING_DATASOURCE_URL → DB_URL → DB_HOST/DB_PORT/DB_NAME
# Render Docker: docker-entrypoint.sh set SPRING_DATASOURCE_URL
# VPS native: DB_URL=jdbc:postgresql://localhost:5432/sit_vnpay_db

spring.datasource.url=${SPRING_DATASOURCE_URL:${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:sit_vnpay_db}?sslmode=disable}}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.h2.console.enabled=false
