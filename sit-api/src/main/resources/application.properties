server.port=${PORT:8001}
server.address=0.0.0.0
server.servlet.context-path=/sit-api

# QC thủ công gửi ảnh base64 trong JSON — cần đủ lớn (2 ảnh ~2MB mỗi ảnh)
server.tomcat.max-http-form-post-size=15MB
server.tomcat.max-swallow-size=15MB

spring.application.name=sit-api
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

sit.callback-timeout-ms=${SIT_TIMEOUT_MS:15000}
sit.simulate-vnpay-ip=${SIT_SIMULATE_VNPAY_IP:true}
sit.cors.allowed-origins=${SIT_CORS_ORIGINS:http://localhost:8000}
sit.cors.allow-onrender=${SIT_CORS_ALLOW_ONRENDER:false}

sit.jwt.secret=${SIT_JWT_SECRET:}
sit.jwt.expiration-ms=${SIT_JWT_EXPIRATION_MS:86400000}

sit.bootstrap.admin-email=${SIT_ADMIN_EMAIL:}
sit.bootstrap.admin-password=${SIT_ADMIN_PASSWORD:}
sit.bootstrap.admin-full-name=${SIT_ADMIN_NAME:System Admin}

logging.level.com.vnpay.sit=INFO
