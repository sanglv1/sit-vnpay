# Development profile — PostgreSQL local (default)

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5434/sit_vnpay_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:sit123456}
spring.datasource.driver-class-name=${DB_DRIVER:org.postgresql.Driver}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.h2.console.enabled=false

sit.jwt.secret=${SIT_JWT_SECRET:dev-only-secret-min-32-characters-long}
sit.bootstrap.admin-email=${SIT_ADMIN_EMAIL:admin@vnpay.vn}
sit.bootstrap.admin-password=${SIT_ADMIN_PASSWORD:admin123456}
