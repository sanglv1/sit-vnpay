# Render Blueprint — deploy all-in-one: PostgreSQL + API + UI
# https://render.com/docs/blueprint-spec
#
# API và PostgreSQL phải cùng region để dùng internal network.
# Region mặc định: oregon (trùng DB free tier Render tạo lần đầu).

databases:
  - name: sit-vnpay-db
    plan: free
    region: oregon
    databaseName: sit_vnpay_db
    user: sit_vnpay

services:
  - type: web
    name: sit-api
    runtime: docker
    rootDir: sit-api
    plan: free
    region: oregon
    healthCheckPath: /sit-api/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DB_REGION
        value: oregon
      - key: DB_URL
        fromDatabase:
          name: sit-vnpay-db
          property: connectionString
      - key: DB_HOST
        fromDatabase:
          name: sit-vnpay-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: sit-vnpay-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: sit-vnpay-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: sit-vnpay-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: sit-vnpay-db
          property: password
      - key: SIT_JWT_SECRET
        generateValue: true
      - key: SIT_ADMIN_EMAIL
        value: admin@vnpay.vn
      - key: SIT_ADMIN_PASSWORD
        generateValue: true
      - key: SIT_ADMIN_NAME
        value: System Admin
      - key: SIT_CORS_ALLOW_ONRENDER
        value: "true"

  - type: web
    name: sit-ui
    runtime: static
    buildCommand: chmod +x sit-ui/scripts/render-build.sh && ./sit-ui/scripts/render-build.sh
    staticPublishPath: sit-ui/build
    envVars:
      - key: SIT_API_SERVICE_URL
        fromService:
          type: web
          name: sit-api
          envVarKey: RENDER_EXTERNAL_URL
